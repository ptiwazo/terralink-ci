services:
  db:
    image: postgres:16-alpine
    container_name: terralink_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-terralink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terralink}
      POSTGRES_DB: ${POSTGRES_DB:-terralink}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Crée aussi la base de test au démarrage du conteneur.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-terralink}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
